source = ./colors.conf

$font = CommitMono Nerd Font

# BACKGROUND
background {
    monitor =
    path = $image
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
}


# Day
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A")"
    color = $primary
    font_size = 90
    font_family = $font
    position = 0, 350
    halign = center
    valign = center
}

# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %B")"
    color = $primary
    font_size = 40
    font_family = $font
    position = 0, 250
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %I:%M -")</span>"
    color = $primary
    font_size = 20
    font_family = $font
    position = 0, 190
    halign = center
    valign = center
}

# Profie-Photo
image {
    monitor =
    path = $HOME/.config/hypr/user.png
    border_size = 2
    border_color = $primary
    size = 130
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 40
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 300, 60
    color = $background
    rounding = -1
    border_size = 0
    border_color = rgba(255, 255, 255, 0)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 0, -130
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = $USER
    color = $primary
    font_size = 18
    font_family = $font
    position = 0, -130
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = $background
    font_color = $primary
    fade_on_empty = false
    font_family = $font
    placeholder_text = <i>Constrasinal</i>
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}

# Reboot
label {
    monitor =
    text = 󰜉
    color = $primary
    font_size = 50
    onclick = systemctl reboot
    position = 0, 100
    halign = center
    valign = bottom
}

# Power off
label {
    monitor =
    text = 󰐥
    color = $primary
    font_size = 50
    onclick = systemctl poweroff
    position = 820, 100
    halign =left 
    valign = bottom
}

# Suspend
label {
    monitor =
    text = 󰤄
    color = $primary
    font_size = 50
    onclick = systemctl suspend
    position = -820, 100
    halign = right
    valign = bottom
}